# Lockify - Main Configuration
# Production me secrets environment variables se aayenge

spring:
  application:
    name: lockify

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lockify}
    username: ${DB_USER:lockify}
    password: ${DB_PASSWORD:lockify_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway schema manage karega, Hibernate sirf validate
    open-in-view: false   # Production best practice - lazy loading request ke bahar nahi
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never  # Production me internal errors expose mat karo
    include-stacktrace: never

# Lockify custom security settings
lockify:
  phase2:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    email-verification-hours: 24
    password-reset-hours: 1
    password-history-count: 5
    password-expiry-days: 90
  phase4:
    ratelimit:
      enabled: true
      requests-per-minute: 10
      auth-endpoints:
        - /api/auth/login
        - /api/auth/register
        - /api/account/forgot-password
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  security:
    pepper: ${PASSWORD_PEPPER:}
    bcrypt-strength: ${BCRYPT_STRENGTH:12}
    jwt:
      # Production me strong random secret use karo (min 256 bits)
      secret: ${JWT_SECRET:lockify-dev-secret-key-change-in-production-min-32-chars!!}
      access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY:15}
      refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY:7}
      issuer: lockify

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.lockify: DEBUG
    org.springframework.security: INFO
